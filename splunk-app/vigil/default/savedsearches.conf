[vigil_active_gaps]
search = index=vigil sourcetype="ifrc:surge_alert" deployment_needed=true | stats count as open_gaps by country | sort -open_gaps | head 10
dispatch.earliest_time = -24h
dispatch.latest_time = now

[vigil_severity_distribution]
search = index=vigil sourcetype="vigil:scored_gap" | stats count by severity_level
dispatch.earliest_time = -24h
dispatch.latest_time = now

[vigil_critical_aging]
search = index=vigil sourcetype="vigil:scored_gap" | where severity_level="CRITICAL" OR severity_level="HIGH" | table country_name, disaster_type, severity_score, severity_level | sort -severity_score
dispatch.earliest_time = -24h
dispatch.latest_time = now

[vigil_gap_severity]
search = index=vigil sourcetype="ifrc:surge_alert" | stats count by status
dispatch.earliest_time = -24h
dispatch.latest_time = now

[vigil_disaster_types]
search = index=vigil sourcetype="ifrc:surge_alert" | stats count by disaster_type | sort -count
dispatch.earliest_time = -24h
dispatch.latest_time = now

[vigil_recent_scored]
search = index=vigil sourcetype="vigil:scored_gap" | table _time, country, disaster_type, severity_level, severity_score, explanation_summary | sort -_time | head 20
dispatch.earliest_time = -24h
dispatch.latest_time = now

[vigil_pipeline_health]
search = index=vigil sourcetype="vigil:metrics" | stats latest(cycle_duration_ms) as last_cycle_ms, latest(sent) as last_events_sent, latest(failed) as last_events_failed
dispatch.earliest_time = -24h
dispatch.latest_time = now

[vigil_score_distribution]
search = index=vigil sourcetype="vigil:scored_gap" | bin severity_score span=0.1 | stats count by severity_score | sort severity_score
dispatch.earliest_time = -24h
dispatch.latest_time = now
