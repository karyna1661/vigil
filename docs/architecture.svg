<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="splunkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b21a8"/>
      <stop offset="100%" style="stop-color:#581c87"/>
    </linearGradient>
    <linearGradient id="vigilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#115e59"/>
    </linearGradient>
    <linearGradient id="ifrcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f8fafc" rx="12"/>

  <!-- Header -->
  <rect x="40" y="30" width="1120" height="70" fill="url(#headerGrad)" rx="8" filter="url(#shadow)"/>
  <text x="600" y="60" text-anchor="middle" fill="white" font-size="22" font-weight="bold">VIGIL SYSTEM ARCHITECTURE</text>
  <text x="600" y="82" text-anchor="middle" fill="#94a3b8" font-size="12">Agentic Deployment Intelligence for Humanitarian Ops</text>

  <!-- IFRC GO API -->
  <rect x="60" y="140" width="200" height="80" fill="url(#ifrcGrad)" rx="8" filter="url(#shadow)"/>
  <text x="160" y="170" text-anchor="middle" fill="white" font-size="14" font-weight="bold">IFRC GO API</text>
  <text x="160" y="190" text-anchor="middle" fill="#fecaca" font-size="10">(External)</text>
  <text x="160" y="208" text-anchor="middle" fill="#fecaca" font-size="9">327 alerts live</text>

  <!-- Arrow IFRC → Ingest -->
  <line x1="160" y1="220" x2="160" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="180" y="245" fill="#64748b" font-size="9">REST API</text>

  <!-- Ingest -->
  <rect x="60" y="260" width="200" height="70" fill="#1e40af" rx="8" filter="url(#shadow)"/>
  <text x="160" y="285" text-anchor="middle" fill="white" font-size="13" font-weight="bold">PHASE 1: INGEST</text>
  <text x="160" y="305" text-anchor="middle" fill="#bfdbfe" font-size="10">ingest.ts → Splunk HEC</text>

  <!-- Arrow Ingest → Splunk -->
  <line x1="160" y1="330" x2="160" y2="370" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="180" y="355" fill="#64748b" font-size="9">HEC</text>

  <!-- Splunk Block -->
  <rect x="320" y="140" width="560" height="120" fill="url(#splunkGrad)" rx="8" filter="url(#shadow)"/>
  <text x="600" y="165" text-anchor="middle" fill="white" font-size="14" font-weight="bold">SPLUNK (index=vigil)</text>

  <!-- Splunk Indexes -->
  <rect x="340" y="180" width="160" height="60" fill="#7c3aed" rx="4"/>
  <text x="420" y="200" text-anchor="middle" fill="white" font-size="10" font-weight="bold">ifrc:surge_alert</text>
  <text x="420" y="215" text-anchor="middle" fill="#ddd6fe" font-size="9">Raw Alerts</text>

  <rect x="520" y="180" width="160" height="60" fill="#7c3aed" rx="4"/>
  <text x="600" y="200" text-anchor="middle" fill="white" font-size="10" font-weight="bold">vigil:scored_gap</text>
  <text x="600" y="215" text-anchor="middle" fill="#ddd6fe" font-size="9">Scored Gaps</text>

  <rect x="700" y="180" width="160" height="60" fill="#7c3aed" rx="4"/>
  <text x="780" y="200" text-anchor="middle" fill="white" font-size="10" font-weight="bold">vigil:metrics</text>
  <text x="780" y="215" text-anchor="middle" fill="#ddd6fe" font-size="9">Pipeline Health</text>

  <!-- Arrow Splunk → Vigil Loop -->
  <line x1="600" y1="260" x2="600" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="620" y="285" fill="#64748b" font-size="9">SPL query</text>

  <!-- Vigil Observer Loop -->
  <rect x="320" y="300" width="560" height="280" fill="url(#vigilGrad)" rx="8" filter="url(#shadow)"/>
  <text x="600" y="325" text-anchor="middle" fill="white" font-size="14" font-weight="bold">VIGIL OBSERVER LOOP (vigil.ts)</text>

  <!-- Cycle Banner -->
  <rect x="340" y="340" width="520" height="30" fill="#0d9488" rx="4"/>
  <text x="600" y="360" text-anchor="middle" fill="white" font-size="10" font-weight="bold">CYCLE: observe → detect → score → explain → output → sleep (30s)</text>

  <!-- Phase Boxes -->
  <rect x="340" y="385" width="120" height="80" fill="#0f766e" rx="4" stroke="#14b8a6" stroke-width="1"/>
  <text x="400" y="405" text-anchor="middle" fill="white" font-size="11" font-weight="bold">DETECT</text>
  <text x="400" y="425" text-anchor="middle" fill="#ccfbf1" font-size="9">critical +</text>
  <text x="400" y="440" text-anchor="middle" fill="#ccfbf1" font-size="9">severe gaps</text>
  <text x="400" y="458" text-anchor="middle" fill="#99f6e4" font-size="8">detect.ts</text>

  <rect x="480" y="385" width="120" height="80" fill="#0f766e" rx="4" stroke="#14b8a6" stroke-width="1"/>
  <text x="540" y="405" text-anchor="middle" fill="white" font-size="11" font-weight="bold">SCORE</text>
  <text x="540" y="425" text-anchor="middle" fill="#ccfbf1" font-size="9">timeGap(0.5)</text>
  <text x="540" y="440" text-anchor="middle" fill="#ccfbf1" font-size="9">+response(0.3)</text>
  <text x="540" y="458" text-anchor="middle" fill="#99f6e4" font-size="8">severity.ts</text>

  <rect x="620" y="385" width="120" height="80" fill="#0f766e" rx="4" stroke="#14b8a6" stroke-width="1"/>
  <text x="680" y="405" text-anchor="middle" fill="white" font-size="11" font-weight="bold">EXPLAIN</text>
  <text x="680" y="425" text-anchor="middle" fill="#ccfbf1" font-size="9">Splunk AI</text>
  <text x="680" y="440" text-anchor="middle" fill="#ccfbf1" font-size="9">(primary)</text>
  <text x="680" y="458" text-anchor="middle" fill="#99f6e4" font-size="8">explain.ts</text>

  <rect x="760" y="385" width="100" height="80" fill="#0f766e" rx="4" stroke="#14b8a6" stroke-width="1"/>
  <text x="810" y="405" text-anchor="middle" fill="white" font-size="11" font-weight="bold">OUTPUT</text>
  <text x="810" y="425" text-anchor="middle" fill="#ccfbf1" font-size="9">Ranked gaps</text>
  <text x="810" y="440" text-anchor="middle" fill="#ccfbf1" font-size="9">+ audit trail</text>
  <text x="810" y="458" text-anchor="middle" fill="#99f6e4" font-size="8">vigil.ts</text>

  <!-- Types Box -->
  <rect x="340" y="485" width="520" height="40" fill="#134e4a" rx="4"/>
  <text x="600" y="510" text-anchor="middle" fill="#99f6e4" font-size="10">TYPES: WorldState → SeverityOutput → Explanation → CycleResult</text>

  <!-- Mimo Fallback -->
  <rect x="340" y="540" width="520" height="30" fill="#134e4a" rx="4"/>
  <text x="600" y="560" text-anchor="middle" fill="#5eead4" font-size="10">FALLBACK: Splunk AI → Mimo → Template</text>

  <!-- Arrow Vigil → Splunk Viz -->
  <line x1="600" y1="580" x2="600" y2="620" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="620" y="605" fill="#64748b" font-size="9">HEC POST</text>

  <!-- Splunk Visualization -->
  <rect x="320" y="620" width="560" height="100" fill="#7c3aed" rx="8" filter="url(#shadow)"/>
  <text x="600" y="645" text-anchor="middle" fill="white" font-size="14" font-weight="bold">SPLUNK VISUALIZATION</text>

  <rect x="340" y="660" width="160" height="45" fill="#6d28d9" rx="4"/>
  <text x="420" y="680" text-anchor="middle" fill="white" font-size="10">Active Gaps by Country</text>
  <text x="420" y="695" text-anchor="middle" fill="#ddd6fe" font-size="9">Top 10</text>

  <rect x="520" y="660" width="160" height="45" fill="#6d28d9" rx="4"/>
  <text x="600" y="680" text-anchor="middle" fill="white" font-size="10">Severity Distribution</text>
  <text x="600" y="695" text-anchor="middle" fill="#ddd6fe" font-size="9">Pie Chart</text>

  <rect x="700" y="660" width="160" height="45" fill="#6d28d9" rx="4"/>
  <text x="780" y="680" text-anchor="middle" fill="white" font-size="10">Critical Alerts Aging</text>
  <text x="780" y="695" text-anchor="middle" fill="#ddd6fe" font-size="9">&gt;7 days</text>

  <!-- Arrowhead Marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Design Principles -->
  <rect x="60" y="750" width="520" height="120" fill="white" rx="8" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="70" y="775" fill="#1e293b" font-size="13" font-weight="bold">DESIGN PRINCIPLES</text>
  <text x="70" y="795" fill="#475569" font-size="10">1. TRUTH → JUDGMENT → EXPLANATION</text>
  <text x="70" y="815" fill="#475569" font-size="10">2. DETERMINISTIC CORE — LLM explains, never decides</text>
  <text x="70" y="835" fill="#475569" font-size="10">3. BOUNDED AI — Structured JSON, validated output</text>
  <text x="70" y="855" fill="#475569" font-size="10">4. REAL DATA ONLY — Live IFRC GO API, no mocks</text>

  <!-- Tech Stack -->
  <rect x="620" y="750" width="520" height="120" fill="white" rx="8" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="630" y="775" fill="#1e293b" font-size="13" font-weight="bold">TECH STACK</text>
  <text x="630" y="795" fill="#475569" font-size="10">Runtime: TypeScript on Node.js</text>
  <text x="630" y="815" fill="#475569" font-size="10">Data: IFRC GO API (live, public)</text>
  <text x="630" y="835" fill="#475569" font-size="10">Ingestion: Splunk HEC | Query: Splunk MCP</text>
  <text x="630" y="855" fill="#475569" font-size="10">AI: Splunk AI (primary) / Mimo (fallback)</text>

  <!-- Data Flow Arrow (left side) -->
  <path d="M 60 280 L 60 700 L 320 700" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="30" y="500" fill="#94a3b8" font-size="9" transform="rotate(-90, 30, 500)">DATA FLOW</text>

</svg>